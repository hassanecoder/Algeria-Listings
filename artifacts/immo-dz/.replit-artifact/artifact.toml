kind = "web"
previewPath = "/"
title = "ImmoAlgérie - Real Estate"
version = "1.0.0"
id = "artifacts/immo-dz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22496

[services.development]
run = "pnpm --filter @workspace/immo-dz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/immo-dz", "run", "build" ]
publicDir = "artifacts/immo-dz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22496"
BASE_PATH = "/"
